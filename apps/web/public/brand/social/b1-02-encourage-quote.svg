<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <rect width="1080" height="1080" fill="#20262B"/>
  <text x="540" y="170" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" letter-spacing="6" fill="#3BEA7E">THE BELIEF</text>
  <text x="120" y="235" font-family="Georgia, 'Times New Roman', serif" font-size="180" font-weight="700" fill="#3A444B">&#8220;</text>
  <text x="540" y="400" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="88" font-weight="800" fill="#F1F5F3">Your profile</text>
  <text x="540" y="500" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="88" font-weight="800" fill="#F1F5F3">can't show how</text>
