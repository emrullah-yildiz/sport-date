  <text x="540" y="700" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="88" font-weight="800" fill="#F1F5F3">someone.</text>
  <text x="540" y="880" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="34" fill="#8A9BA0">You can only see it in motion.</text>
  <text x="540" y="1020" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#3BEA7E">keepitup.social</text>
