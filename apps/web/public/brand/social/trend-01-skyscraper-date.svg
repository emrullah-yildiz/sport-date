<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <rect width="1080" height="1080" fill="#20262B"/>
  <text x="80" y="150" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="800" letter-spacing="5" fill="#3BEA7E">MEANWHILE, ON KEEPITUP</text>
  <text x="80" y="360" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="800" fill="#F1F5F3">You don't need to</text>
  <text x="80" y="446" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="800" fill="#F1F5F3">scale a skyscraper</text>
  <text x="80" y="532" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="800" fill="#F1F5F3">for a <tspan fill="#3BEA7E">memorable</tspan> first date.</text>
  <text x="80" y="700" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="700" fill="#F1F5F3">A climbing wall. A sunrise run.</text>
  <text x="80" y="756" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="700" fill="#F1F5F3">A padel match. 🧗🏃🎾</text>
  <text x="80" y="852" font-family="Arial, Helvetica, sans-serif" font-size="36" fill="#8A9BA0">Same butterflies. Better odds.</text>
  <text x="80" y="1020" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#3BEA7E">keepitup.social</text>
</svg>
