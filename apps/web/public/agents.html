<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>RALLY // AGENT GRID</title>
<style>
  :root{ --green:#3BEA7E; --green-dim:#1c6f3d; --blue:#43C6F5; --red:#FF6E68; --bg:#05080a; --panel:rgba(8,16,12,.72); --line:rgba(59,234,126,.22); }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; background:var(--bg); color:var(--green);
    font-family:"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace; overflow-x:hidden; }
  #rain{ position:fixed; inset:0; z-index:0; opacity:.35; }
  .wrap{ position:relative; z-index:1; max-width:1100px; margin:0 auto; padding:22px 18px 60px; }
  h1{ font-size:20px; letter-spacing:.28em; margin:0 0 2px; text-shadow:0 0 12px rgba(59,234,126,.6); }
  .sub{ color:var(--green-dim); font-size:12px; letter-spacing:.18em; margin-bottom:18px; }
  .sub b{ color:var(--green); }
  .grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(210px,1fr)); gap:12px; }
  .card{ background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:14px;
    box-shadow:0 0 0 1px rgba(0,0,0,.4), inset 0 0 30px rgba(59,234,126,.04); backdrop-filter:blur(2px); }
  .card .role{ font-size:11px; letter-spacing:.22em; color:var(--green-dim); }
  .card .name{ font-size:16px; font-weight:700; margin:2px 0 8px; letter-spacing:.05em; }
  .led{ display:inline-block; width:9px; height:9px; border-radius:50%; margin-right:8px; vertical-align:middle;
    background:#12331f; box-shadow:0 0 0 1px rgba(59,234,126,.25); }
  .working .led{ background:var(--green); box-shadow:0 0 12px 2px rgba(59,234,126,.85); animation:pulse 1.1s infinite; }
  .working{ border-color:rgba(59,234,126,.5); }
  .status{ font-size:12px; text-transform:uppercase; letter-spacing:.14em; }
  .working .status{ color:var(--green); } .idle .status{ color:var(--green-dim); }
  .ticket{ margin-top:9px; font-size:11.5px; color:#bfe7cf; word-break:break-word; min-height:15px; }
  .ticket .tag{ color:var(--blue); }
  .since{ margin-top:4px; font-size:10.5px; color:var(--green-dim); letter-spacing:.06em; }
  @keyframes pulse{ 0%,100%{ opacity:1 } 50%{ opacity:.45 } }
  .stats{ display:flex; flex-wrap:wrap; gap:8px; margin:18px 0 10px; }
  .pill{ border:1px solid var(--line); border-radius:999px; padding:5px 11px; font-size:11px; letter-spacing:.08em; color:#bfe7cf; }
  .pill b{ color:var(--green); }
  .pill.blk b{ color:var(--red); } .pill.info b{ color:var(--blue); }
  .feedwrap{ margin-top:14px; border:1px solid var(--line); border-radius:12px; background:rgba(4,10,7,.7); }
  .feedwrap h2{ font-size:11px; letter-spacing:.22em; color:var(--green-dim); margin:0; padding:11px 14px; border-bottom:1px solid var(--line); }
  #feed{ list-style:none; margin:0; padding:8px 0; max-height:300px; overflow:auto; }
  #feed li{ padding:4px 14px; font-size:11.5px; line-height:1.5; color:#a9dcbc; border-left:2px solid transparent; white-space:pre-wrap; }
  #feed li:first-child{ color:var(--green); border-left-color:var(--green); text-shadow:0 0 8px rgba(59,234,126,.4); }
  #feed li .ph{ color:var(--blue); } #feed li .verified{ color:var(--green); } #feed li .reopened{ color:var(--red); }
  .foot{ margin-top:16px; font-size:10.5px; color:var(--green-dim); letter-spacing:.08em; }
  .dead{ color:var(--red); }
  a{ color:var(--blue); }
</style>
</head>
<body>
<canvas id="rain"></canvas>
<div class="wrap">
  <h1>RALLY // AGENT&nbsp;GRID</h1>
  <div class="sub">FOUR-AGENT EXPERIENCE LOOP · <span id="loopState">connecting…</span> · updated <b id="updated">—</b></div>
  <div class="grid" id="agents"></div>
  <div class="stats" id="stats"></div>
  <div class="feedwrap">
    <h2>▸ LIVE LOG FEED</h2>
    <ul id="feed"><li>booting…</li></ul>
  </div>
  <div class="foot">Reads the local experience-loop artifacts (status.json · LOG.md · ticket queue). "Working" reflects the orchestrator's heartbeat; between phases agents show IDLE. Poll: 2.5s.</div>
</div>
<script>
// --- Matrix rain ---
const cv=document.getElementById('rain'), ctx=cv.getContext('2d');
let cols, drops; const glyphs="01ﾊﾐﾋｰｳｼﾅﾉﾂﾃRALLY<>{}/#*+=".split("");
function sizeRain(){ cv.width=innerWidth; cv.height=innerHeight; cols=Math.floor(cv.width/14); drops=Array(cols).fill(1); }
addEventListener('resize', sizeRain); sizeRain();
function drawRain(){
  ctx.fillStyle="rgba(5,8,10,.08)"; ctx.fillRect(0,0,cv.width,cv.height);
  ctx.fillStyle="#3BEA7E"; ctx.font="14px monospace";
  for(let i=0;i<cols;i++){ const t=glyphs[Math.floor(Math.random()*glyphs.length)];
    ctx.fillText(t, i*14, drops[i]*14);
    if(drops[i]*14>cv.height && Math.random()>.975) drops[i]=0; drops[i]++; }
}
setInterval(drawRain,55);

// --- Live status ---
const ROLES={ Orchestrator:"CONDUCTOR", Planner:"PLAN", Builder:"BUILD", Tester:"TEST", UserSimulator:"USE" };
function ago(iso){ if(!iso) return ""; const s=Math.max(0,(Date.now()-new Date(iso).getTime())/1000);
  if(s<60) return Math.floor(s)+"s ago"; if(s<3600) return Math.floor(s/60)+"m ago"; return Math.floor(s/3600)+"h ago"; }
function esc(x){ return (x||"").replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function colorLog(l){ return esc(l)
  .replace(/\|\s*(plan|build|test|user-sim|explore|owner-inject|recover|init)\s*\|/, (m,p)=>'| <span class="ph">'+p+'</span> |')
  .replace(/\bverified\b/g,'<span class="verified">verified</span>')
  .replace(/\breopened\b/g,'<span class="reopened">reopened</span>'); }

async function tick(){
  let d; try{ d=await (await fetch('/api/internal/agent-status',{cache:'no-store'})).json(); }
  catch{ document.getElementById('loopState').innerHTML='<span class="dead">API OFFLINE</span>'; return; }
  if(!d.available){ document.getElementById('loopState').innerHTML='<span class="dead">NO LOOP DATA</span>'; }
  else document.getElementById('loopState').textContent = (d.loop||'?').toUpperCase() + (d.phase? ' · phase:'+d.phase : '');
  document.getElementById('updated').textContent = d.updatedAt? ago(d.updatedAt): '—';

  const g=document.getElementById('agents'); g.innerHTML='';
  (d.agents||[]).forEach(a=>{
    const working=a.state==='working';
    const el=document.createElement('div'); el.className='card '+(working?'working':'idle');
    el.innerHTML='<div class="role">'+(ROLES[a.name]||'')+'</div>'
      +'<div class="name"><span class="led"></span>'+esc(a.name)+'</div>'
      +'<div class="status">'+(working?'▶ working':'· idle')+'</div>'
      +'<div class="ticket">'+(a.ticket? '<span class="tag">▷</span> '+esc(a.ticket) : (a.lastAction? esc(a.lastAction.split('|').pop().trim()).slice(0,90): '—'))+'</div>'
      +'<div class="since">'+(working&&a.since? 'since '+ago(a.since): (a.lastAction? 'last: seen in log':''))+'</div>';
    g.appendChild(el);
  });

  const t=d.tickets||{}; const s=document.getElementById('stats');
  s.innerHTML=[
    ['ready',t.ready,''],['in-progress',t['in-progress'],''],['implemented',t.implemented,''],
    ['verified',t.verified,'info'],['blocked-owner',t['blocked-owner'],'blk'],['archived',t.archived,'']
  ].map(([k,v,c])=>'<span class="pill '+c+'">'+k+' <b>'+(v||0)+'</b></span>').join('');

  const f=document.getElementById('feed'); f.innerHTML=(d.log||[]).map(l=>'<li>'+colorLog(l)+'</li>').join('') || '<li>no log yet</li>';
}
tick(); setInterval(tick, 2500);
</script>
</body>
</html>
