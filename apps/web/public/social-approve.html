<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>KeepItUp // Social — Content Approval Queue</title>
<style>
  :root{
    --bg:#181d21; --panel:#20262B; --panel2:#242B31; --line:rgba(59,234,126,.20);
    --neon:#3BEA7E; --ink:#F1F5F3; --mut:#8A9BA0; --amber:#E8B04B; --red:#FF6E68; --blue:#43C6F5;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; background:var(--bg); color:var(--ink); overflow-x:hidden; max-width:100%;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; -webkit-font-smoothing:antialiased; line-height:1.5; }
  a{ color:var(--neon); text-decoration:none; }
  .wrap{ max-width:920px; margin:0 auto; padding:26px 16px 90px; }
  .top{ display:flex; align-items:flex-start; justify-content:space-between; flex-wrap:wrap; gap:10px; border-bottom:1px solid var(--line); padding-bottom:16px; }
  .brand{ font-size:12px; letter-spacing:.26em; color:var(--neon); font-weight:800; text-transform:uppercase; }
  .top h1{ font-size:26px; margin:6px 0 0; }
  .who{ font-size:13px; color:var(--mut); margin-top:4px; }
  h2.sec{ font-size:13px; letter-spacing:.16em; text-transform:uppercase; color:var(--mut); margin:28px 0 14px; }
  /* dispatch trigger — "done reviewing, send to the agent" */
  .dispatch{ background:linear-gradient(180deg, rgba(59,234,126,.10), rgba(59,234,126,.04)); border:1px solid rgba(59,234,126,.35);
    border-radius:14px; padding:16px 18px; margin:20px 0 6px; }
  .dbtn{ width:100%; min-height:54px; border-radius:12px; border:1px solid var(--neon); background:rgba(59,234,126,.18);
    color:var(--neon); font-size:16px; font-weight:800; cursor:pointer; letter-spacing:.01em; transition:background .15s, opacity .15s; }
  .dbtn:hover:not(:disabled){ background:rgba(59,234,126,.26); }
  .dbtn.done{ background:var(--neon); color:#0b1410; border-color:var(--neon); }
  .dbtn:disabled{ opacity:.45; cursor:default; }
  .dhint{ margin-top:9px; font-size:13px; color:var(--mut); text-align:center; }
  .dhint.ok{ color:var(--neon); } .dhint.err{ color:var(--red); }
  .note{ background:var(--panel); border:1px solid var(--line); border-left:3px solid var(--neon); border-radius:12px; padding:18px 20px; }
  .note p{ margin:0 0 10px; font-size:15px; } .note p:last-child{ margin:0; }
  /* filter bar */
  .bar{ display:flex; align-items:center; flex-wrap:wrap; gap:8px; margin:18px 0 6px; }
  .filters{ display:flex; flex-wrap:wrap; gap:8px; }
  .fbtn{ min-height:44px; display:inline-flex; align-items:center; padding:0 14px; border:1px solid var(--line); border-radius:10px;
    background:var(--panel); color:var(--ink); font-size:13px; font-weight:700; cursor:pointer; }
  .fbtn[aria-pressed="true"]{ border-color:var(--neon); color:var(--neon); background:rgba(59,234,126,.10); }
  .count{ margin-left:auto; font-size:13px; color:var(--mut); }
  .count b{ color:var(--ink); }
  /* cards */
  .cards{ display:grid; gap:14px; }
  .card{ min-width:0; overflow-wrap:anywhere; background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:16px 18px; border-left:3px solid var(--mut); transition:border-color .2s, opacity .25s; }
  .card.approved{ border-left-color:var(--neon); }
  .card.denied{ border-left-color:var(--red); opacity:.72; }
  .card.pending{ border-left-color:var(--amber); }
  .chips{ display:flex; flex-wrap:wrap; gap:7px; align-items:center; }
  .chip{ font-size:11px; letter-spacing:.06em; text-transform:uppercase; font-weight:800; padding:4px 9px; border-radius:7px;
    background:var(--panel2); color:var(--mut); border:1px solid var(--line); }
  .chip.plat{ color:var(--blue); } .chip.fmt{ color:var(--ink); }
  .chip.trend{ color:var(--amber); }
  .chip.status{ margin-left:auto; }
  .chip.status.approved{ color:var(--neon); border-color:rgba(59,234,126,.5); }
  .chip.status.denied{ color:var(--red); border-color:rgba(255,110,104,.5); }
  .chip.status.pending{ color:var(--amber); border-color:rgba(232,176,75,.5); }
  .card h3{ margin:12px 0 2px; font-size:18px; }
  .card .titlerow{ font-size:12px; color:var(--mut); }
  .hook{ margin:12px 0; font-size:16px; font-weight:700; color:var(--ink); border-left:2px solid var(--neon); padding-left:12px; }
  .fld{ margin:10px 0; }
  .fld .lbl{ font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--mut); font-weight:800; margin-bottom:4px; }
  .fld .val{ font-size:14px; color:#c8d3d0; white-space:pre-wrap; overflow-wrap:anywhere; }
  ol.slides{ margin:6px 0 0; padding-left:22px; } ol.slides li{ font-size:14px; color:#c8d3d0; margin-bottom:5px; }
  .shots{ display:flex; min-width:0; max-width:100%; gap:10px; overflow-x:auto; padding:4px 2px 12px; scroll-snap-type:x mandatory; -webkit-overflow-scrolling:touch; }
  .shots .shot{ flex:0 0 auto; scroll-snap-align:start; line-height:0; }
  .shots img{ height:260px; width:auto; max-width:none; border-radius:16px; border:1px solid var(--line); display:block; background:var(--panel2); }
  .shots .shot:hover img{ border-color:rgba(59,234,126,.5); }
  .tags{ display:flex; flex-wrap:wrap; gap:6px; } .tag{ font-size:12px; color:var(--blue); background:rgba(67,198,245,.10); border-radius:6px; padding:2px 7px; }
  /* decision actions */
  .actions{ display:flex; flex-wrap:wrap; gap:9px; margin-top:14px; align-items:center; }
  .abtn{ min-height:44px; flex:1 1 auto; min-width:120px; display:inline-flex; align-items:center; justify-content:center; gap:6px;
    border:1px solid var(--line); border-radius:10px; font-size:14px; font-weight:800; cursor:pointer; background:var(--panel2); color:var(--ink); transition:background .15s, color .15s, border-color .15s, opacity .15s; }
  .abtn.approve{ color:var(--neon); border-color:rgba(59,234,126,.45); }
  .abtn.approve.active{ background:var(--neon); color:#0b1410; border-color:var(--neon); }
  .abtn.deny{ color:var(--red); border-color:rgba(255,110,104,.40); }
  .abtn.deny.active{ background:var(--red); color:#180a0a; border-color:var(--red); }
  .abtn:disabled{ opacity:.4; cursor:not-allowed; }
  .abtn.improve{ color:var(--blue); border-color:rgba(67,198,245,.45); flex:0 0 auto; min-width:0; padding:0 16px; }
  .change{ background:none; border:none; color:var(--mut); font-size:13px; font-weight:800; text-decoration:underline; cursor:pointer; padding:0 8px; min-height:44px; }
  .change:hover{ color:var(--ink); }
  .decided{ font-size:12.5px; font-weight:800; margin-top:8px; letter-spacing:.02em; }
  .decided.approved{ color:var(--neon); } .decided.denied{ color:var(--red); }
  .decided.improve{ color:var(--blue); }
  .commentbox{ margin-top:12px; }
  textarea{ width:100%; min-height:64px; resize:vertical; background:var(--bg); color:var(--ink); border:1px solid var(--line);
    border-radius:10px; padding:10px 12px; font:inherit; font-size:14px; }
  textarea:focus{ outline:none; border-color:var(--neon); }
  .saverow{ display:flex; align-items:center; flex-wrap:wrap; gap:10px; margin-top:8px; }
  .savebtn{ min-height:44px; padding:0 16px; border:1px solid var(--line); border-radius:10px; background:var(--panel2); color:var(--neon);
    font-size:13px; font-weight:800; cursor:pointer; }
  .msg{ font-size:12.5px; color:var(--mut); flex:1 1 100%; }
  .msg.ok{ color:var(--neon); } .msg.err{ color:var(--red); } .msg.busy{ color:var(--blue); }
  .empty{ text-align:center; color:var(--mut); padding:40px 10px; font-size:15px; }
  .foot{ margin-top:34px; font-size:12px; color:var(--mut); line-height:1.7; border-top:1px solid var(--line); padding-top:16px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div>
      <div class="brand">KeepItUp · Social</div>
      <h1>Content Approval Queue</h1>
      <div class="who">Approve, deny, or comment on post ideas the growth agent files. Approved ideas get rendered &amp; scheduled.</div>
    </div>
  </div>

  <div id="app">
    <div class="empty" id="loading">Loading the queue…</div>
  </div>

  <div class="foot">
    Owner-only. Ideas are drafts — nothing publishes without your approval. Safety &amp; honesty guardrails always apply.
  </div>
</div>

<script>
(function(){
  "use strict";
  var app = document.getElementById("app");
  var FILTERS = [
    { key:"all", label:"All", status:null },
    { key:"pending", label:"Pending", status:"pending" },
    { key:"approved", label:"Approved", status:"approved" },
    { key:"denied", label:"Denied", status:"denied" }
  ];
  var current = "all";
  var ideas = [];
  var approvedUnscheduled = 0;
  var dispatchNotice = "";   // success line under the dispatch button
  var dispatchError = "";    // error line under the dispatch button
  var dispatchDone = false;  // has the go-signal been sent this session view

  function esc(s){ return String(s == null ? "" : s).replace(/[&<>"']/g, function(c){
    return ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" })[c]; }); }

  function apiList(){
    var f = FILTERS.filter(function(x){ return x.key === current; })[0];
    var qs = f && f.status ? ("?status=" + encodeURIComponent(f.status)) : "";
    return fetch("/api/social/ideas" + qs, { credentials:"same-origin", headers:{ "Accept":"application/json" } });
  }

  function signedOutView(){
    app.innerHTML =
      '<div class="note"><p><b>Sign in as the owner to review the queue.</b></p>' +
      '<p>This page is owner-only. <a href="/login">Sign in</a>, then reload to see the pending post ideas.</p></div>';
  }

  function errorView(text){
    app.innerHTML = '<div class="note" style="border-left-color:var(--red)"><p>' + esc(text) + '</p>' +
      '<p><a href="#" id="retry">Try again</a></p></div>';
    var r = document.getElementById("retry");
    if (r) r.addEventListener("click", function(e){ e.preventDefault(); load(); });
  }

  function statusChip(status){
    return '<span class="chip status ' + esc(status) + '">' + esc(status) + '</span>';
  }

  function renderBody(b){
    b = b || {};
    var html = "";
    if (Array.isArray(b.assets) && b.assets.length){
      html += '<div class="fld"><div class="lbl">Post preview — the finished creative (' +
        b.assets.length + (b.assets.length > 1 ? ' slides · swipe →' : ' image') + ')</div><div class="shots">' +
        b.assets.map(function(src, i){ return '<a class="shot" href="' + esc(src) + '" target="_blank" rel="noopener"><img loading="lazy" src="' + esc(src) + '" alt="Slide ' + (i + 1) + '"/></a>'; }).join("") +
        "</div></div>";
    }
    if (Array.isArray(b.slides) && b.slides.length){
      html += '<div class="fld"><div class="lbl">Slides</div><ol class="slides">' +
        b.slides.map(function(s){ return "<li>" + esc(s) + "</li>"; }).join("") + "</ol></div>";
    }
    if (b.script){
      html += '<div class="fld"><div class="lbl">Script</div><div class="val">' + esc(b.script) + "</div></div>";
    }
    if (b.caption){
      html += '<div class="fld"><div class="lbl">Caption</div><div class="val">' + esc(b.caption) + "</div></div>";
    }
    if (Array.isArray(b.hashtags) && b.hashtags.length){
      html += '<div class="fld"><div class="lbl">Hashtags</div><div class="tags">' +
        b.hashtags.map(function(h){ var t = String(h); if (t[0] !== "#") t = "#" + t; return '<span class="tag">' + esc(t) + "</span>"; }).join("") + "</div></div>";
    }
    if (b.cta){
      html += '<div class="fld"><div class="lbl">Call to action</div><div class="val">' + esc(b.cta) + "</div></div>";
    }
    if (b.imageConcept){
      html += '<div class="fld"><div class="lbl">Image concept</div><div class="val">' + esc(b.imageConcept) + "</div></div>";
    }
    return html;
  }

  // Decision buttons. Once a choice is made the OTHER button is locked (disabled)
  // so a click can't land on the wrong action; a "Change" link re-opens both.
  function actionsHtml(idea){
    var s = idea.status;                 // pending | approved | denied
    var locked = s !== "pending";
    var approve =
      '<button class="abtn approve' + (s === "approved" ? " active" : "") + '" data-action="approve"' +
        (locked && s !== "approved" ? " disabled" : "") +
        ' aria-pressed="' + (s === "approved") + '">' + (s === "approved" ? "✓ Approved" : "Approve") + "</button>";
    var deny =
      '<button class="abtn deny' + (s === "denied" ? " active" : "") + '" data-action="deny"' +
        (locked && s !== "denied" ? " disabled" : "") +
        ' aria-pressed="' + (s === "denied") + '">' + (s === "denied" ? "✕ Denied" : "Deny") + "</button>";
    var change = locked ? '<button class="change" data-role="change">Change</button>' : "";
    return '<div class="actions">' + approve + deny + change + "</div>" +
      (s === "approved" ? '<div class="decided approved">Approved — will be scheduled when you hit “Done”.</div>'
       : s === "denied" ? '<div class="decided denied">Denied — the agent will skip this one.</div>' : "");
  }

  function cardHtml(idea){
    var trend = idea.trend ? '<span class="chip trend">' + esc(idea.trend) + "</span>" : "";
    return '<article class="card ' + esc(idea.status) + '" data-id="' + esc(idea.id) + '">' +
      '<div class="chips">' +
        '<span class="chip plat">' + esc(idea.platform) + "</span>" +
        '<span class="chip fmt">' + esc(idea.format) + "</span>" +
        trend + statusChip(idea.status) +
      "</div>" +
      "<h3>" + esc(idea.title) + "</h3>" +
      '<div class="hook">' + esc(idea.hook) + "</div>" +
      renderBody(idea.body) +
      actionsHtml(idea) +
      '<div class="commentbox">' +
        '<label class="lbl" style="display:block;margin-bottom:4px">Owner comment — what to change</label>' +
        '<textarea data-role="comment" placeholder="e.g. Make the caption shorter and punchier; swap the photo for the beach one…">' + esc(idea.ownerComment || "") + "</textarea>" +
        '<div class="saverow">' +
          '<button class="savebtn" data-role="save">Save comment</button>' +
          '<button class="abtn improve" data-role="improve">✨ Improve with my comment</button>' +
          '<span class="msg" data-role="msg"></span>' +
        "</div>" +
      "</div>" +
    "</article>";
  }

  function filtersHtml(){
    return '<div class="bar"><div class="filters">' +
      FILTERS.map(function(f){
        return '<button class="fbtn" data-filter="' + f.key + '" aria-pressed="' + (f.key === current) + '">' + esc(f.label) + "</button>";
      }).join("") +
      '</div><div class="count"><b>' + ideas.length + "</b> " + (ideas.length === 1 ? "idea" : "ideas") + "</div></div>";
  }

  function dispatchHtml(){
    var n = approvedUnscheduled;
    var hasComments = ideas.some(function(i){ return i.ownerComment && String(i.ownerComment).trim(); });
    var canSend = n > 0 || hasComments;
    var label = dispatchDone
      ? "✓ Sent — the agent is on it"
      : "✅ Done — send my approvals &amp; comments (" + n + ")";
    var hint;
    if (dispatchError) hint = '<div class="dhint err">' + esc(dispatchError) + "</div>";
    else if (dispatchNotice) hint = '<div class="dhint ok">' + esc(dispatchNotice) + "</div>";
    else if (!canSend) hint = '<div class="dhint">Approve a post or leave an improvement comment, then send.</div>';
    else hint = '<div class="dhint">Sends your approvals and improvement comments to the agent to schedule &amp; revise.</div>';
    return '<div class="dispatch"><button class="dbtn' + (dispatchDone ? " done" : "") + '" id="dispatch-btn"' +
      ((canSend && !dispatchDone) ? "" : " disabled") + ">" + label + "</button>" + hint + "</div>";
  }

  function render(){
    app.innerHTML = '<div id="bar"></div><div id="list"></div>';
    renderBar();
    renderList();
  }

  function renderBar(){
    var bar = document.getElementById("bar");
    if (!bar) return;
    bar.innerHTML = dispatchHtml() + filtersHtml();
    var db = bar.querySelector("#dispatch-btn");
    if (db) db.addEventListener("click", dispatch);
    Array.prototype.forEach.call(bar.querySelectorAll(".fbtn"), function(btn){
      btn.addEventListener("click", function(){
        current = btn.getAttribute("data-filter");
        dispatchNotice = ""; dispatchError = ""; dispatchDone = false;
        load();
      });
    });
  }

  function renderList(){
    var list = document.getElementById("list");
    if (!list) return;
    list.innerHTML = ideas.length
      ? '<div class="cards">' + ideas.map(cardHtml).join("") + "</div>"
      : '<div class="empty">No ideas in this view yet.</div>';
    Array.prototype.forEach.call(list.querySelectorAll(".card"), wireCard);
  }

  function wireCard(card){
    var id = card.getAttribute("data-id");
    Array.prototype.forEach.call(card.querySelectorAll(".abtn[data-action]"), function(btn){
      btn.addEventListener("click", function(){
        if (btn.disabled) return;
        decide(card, id, { action: btn.getAttribute("data-action") });
      });
    });
    var change = card.querySelector('[data-role="change"]');
    if (change) change.addEventListener("click", function(){
      // Re-open both actions without touching the server — lets the owner
      // deliberately switch a choice, while still guarding accidental clicks.
      Array.prototype.forEach.call(card.querySelectorAll(".abtn[data-action]"), function(b){ b.disabled = false; });
      change.style.display = "none";
    });
    var save = card.querySelector('[data-role="save"]');
    if (save) save.addEventListener("click", function(){
      var ta = card.querySelector('[data-role="comment"]');
      decide(card, id, { comment: ta.value }, { savingMsg: "Saving comment…", okMsg: "Comment saved." });
    });
    var improve = card.querySelector('[data-role="improve"]');
    if (improve) improve.addEventListener("click", function(){ improvePost(card, id); });
  }

  function setMsg(card, text, cls){
    var m = card.querySelector('[data-role="msg"]');
    if (!m) return;
    m.className = "msg" + (cls ? " " + cls : "");
    m.innerHTML = text || "";
  }

  // Replace one card in place with the server's truth (no full-page reload, so
  // feedback is immediate and the rest of the queue doesn't flash/scroll).
  function applyServerIdea(idea, afterMsg){
    var found = false;
    ideas = ideas.map(function(x){ if (x.id === idea.id){ found = true; return idea; } return x; });
    if (!found) ideas.push(idea);

    var node = document.querySelector('.card[data-id="' + idea.id + '"]');
    // preserve an unsaved comment the owner may have typed
    var typed = node ? (node.querySelector('[data-role="comment"]') || {}).value : undefined;

    var droppedByFilter = current !== "all" && idea.status !== current;
    if (droppedByFilter){
      ideas = ideas.filter(function(x){ return x.id !== idea.id; });
      if (node){ node.style.opacity = "0"; setTimeout(renderList, 220); }
      else renderList();
    } else if (node){
      var tmp = document.createElement("div");
      tmp.innerHTML = cardHtml(idea);
      var fresh = tmp.firstChild;
      node.parentNode.replaceChild(fresh, node);
      var freshTa = fresh.querySelector('[data-role="comment"]');
      if (freshTa && typed && typed !== (idea.ownerComment || "")) freshTa.value = typed;
      wireCard(fresh);
      if (afterMsg) setMsg(fresh, afterMsg.text, afterMsg.cls);
    }
    refreshApprovedCount().then(renderBar);
  }

  function decide(card, id, payload, opts){
    opts = opts || {};
    var buttons = card.querySelectorAll("button");
    Array.prototype.forEach.call(buttons, function(b){ b.disabled = true; });
    // optimistic highlight so approve/deny feels instant, before the network returns
    if (payload.action){
      var a = card.querySelector(".abtn.approve"), d = card.querySelector(".abtn.deny");
      if (a) a.classList.toggle("active", payload.action === "approve");
      if (d) d.classList.toggle("active", payload.action === "deny");
    }
    setMsg(card, opts.savingMsg || "Saving…", "busy");
    fetch("/api/social/ideas/" + encodeURIComponent(id), {
      method:"POST",
      credentials:"same-origin",
      headers:{ "Content-Type":"application/json", "Accept":"application/json" },
      body: JSON.stringify(payload)
    }).then(function(res){
      if (res.status === 401 || res.status === 403){ signedOutView(); return null; }
      if (!res.ok) throw new Error("Save failed (" + res.status + ")");
      return res.json();
    }).then(function(data){
      if (!data || !data.idea) return;
      applyServerIdea(data.idea, opts.okMsg ? { text: opts.okMsg, cls: "ok" } : null);
    }).catch(function(err){
      Array.prototype.forEach.call(buttons, function(b){ b.disabled = false; });
      setMsg(card, err.message || "Save failed.", "err");
    });
  }

  // Improve = save the owner's comment as a revise-this instruction, then flag it.
  // The comment is the brief; hitting "Done" sends the go-signal so the agent
  // revises every commented post next cycle.
  function improvePost(card, id){
    var ta = card.querySelector('[data-role="comment"]');
    var text = (ta.value || "").trim();
    if (!text){
      setMsg(card, "Add a comment first — that's the instruction the agent improves from.", "err");
      ta.focus();
      return;
    }
    decide(card, id, { comment: text }, {
      savingMsg: "Sending to the agent…",
      okMsg: "✨ Improvement requested — the agent will revise this from your note. Hit “Done” to send it now."
    });
  }

  // N for the dispatch button: approved ideas not yet scheduled. Sourced from the
  // owner-gated list so the page needs no extra owner-readable count endpoint.
  function refreshApprovedCount(){
    return fetch("/api/social/ideas?status=approved", { credentials:"same-origin", headers:{ "Accept":"application/json" } })
      .then(function(res){ return res.ok ? res.json() : { ideas: [] }; })
      .then(function(d){
        var arr = Array.isArray(d.ideas) ? d.ideas : [];
        approvedUnscheduled = arr.filter(function(i){ return !i.scheduledRef; }).length;
      })
      .catch(function(){ approvedUnscheduled = 0; });
  }

  function dispatch(){
    var btn = document.getElementById("dispatch-btn");
    if (btn){ btn.disabled = true; btn.textContent = "Sending…"; }
    dispatchError = "";
    fetch("/api/social/dispatch", {
      method:"POST", credentials:"same-origin",
      headers:{ "Content-Type":"application/json", "Accept":"application/json" }
    }).then(function(res){
      if (res.status === 401 || res.status === 403){ signedOutView(); return null; }
      if (!res.ok) throw new Error("Could not send the go-signal (" + res.status + ").");
      return res.json();
    }).then(function(data){
      if (!data) return;
      dispatchDone = true;
      dispatchNotice = "Sent — your CEO is scheduling approved posts and revising your commented ones now.";
      renderBar();
    }).catch(function(err){
      dispatchDone = false;
      dispatchError = err.message || "Could not send the go-signal.";
      renderBar();
    });
  }

  function load(){
    apiList().then(function(res){
      if (res.status === 401 || res.status === 403){ signedOutView(); return null; }
      if (!res.ok) throw new Error("Could not load the queue (" + res.status + ").");
      return res.json();
    }).then(function(data){
      if (!data) return null;
      ideas = Array.isArray(data.ideas) ? data.ideas : [];
      return refreshApprovedCount().then(function(){ render(); });
    }).catch(function(err){ errorView(err.message || "Could not load the queue."); });
  }

  load();
})();
</script>
</body>
</html>
