  <path d="M27 20 C 24 26, 19 27, 14 25" stroke="#3BEA7E" stroke-width="3.5" stroke-linecap="round" fill="none" opacity="0.55"/>
  <circle cx="27" cy="10" r="3.4" fill="#3BEA7E"/>
</svg>
