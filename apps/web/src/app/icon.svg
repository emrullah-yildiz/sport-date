<!-- Favicon / app icon. This is the ONE brand asset that cannot import from
     src/lib/brand.tsx (Next.js serves it as a raw static file), so it
     hand-mirrors the rally-arc mark. Keep the paths, colors, and the aria-label
     in sync with RALLY_GLYPH_PATHS / BRAND_ACCENT / BRAND_BG / BRAND_NAME in
     src/lib/brand.tsx — the "HOW TO SWAP THE BRAND" note there is the source of
     truth. brand.test.tsx fails if this file drifts. -->
